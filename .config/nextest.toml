# Workspace nextest configuration. `cargo nextest run --bins` is the fast
# local equivalent of `cargo test --bins`: one process per test (no shared
# process globals), better scheduling, per-test timings.

[profile.default]
# Surface anything slower than 15s in the run summary; two periods then
# terminate — no unit test should legitimately run 30s.
slow-timeout = { period = "15s", terminate-after = 2 }
final-status-level = "slow"

[profile.default.junit]
# Per-test timings for slow-test audits (target/nextest/default/junit.xml).
path = "junit.xml"

# Heavy-crypto tests (subprocess `security` import, real keygen) need
# headroom on loaded boxes. (The broader "macOS is slow" class turned out
# to be spawn_web_gateway's session-index warm scan walking the real
# ~/.intendant per test process — gated out under cfg(test) in
# listener.rs, after which peer/gateway tests run in milliseconds.)
[[profile.default.overrides]]
filter = 'test(/p12_|_recert|keychain/)'
slow-timeout = { period = "60s", terminate-after = 4 }

# worktree_inventory tests spawn real git subprocesses (init, worktree
# add); on a box saturated by parallel agents the fork/exec latency alone
# can cross 30s. Load headroom, not a slow test.
[[profile.default.overrides]]
filter = 'test(/^worktree_inventory::/)'
slow-timeout = { period = "60s", terminate-after = 4 }

# Federation gateway rigs: each spins a real web gateway + WebSocket
# transport (+ card fetch) and polls with multi-second deadlines; when
# several run concurrently on a loaded box they blow the default budget
# (observed as TIMEOUT batches across registry/handle/coordinator runs
# at load average ~20) while passing comfortably under `cargo test` and
# in isolation. (The worst of that class was the session-index warm scan
# noted above — this stays as pure loaded-box headroom.)
[[profile.default.overrides]]
filter = 'test(/peer::(registry::tests::add_peer_|handle::tests::snapshot_carries_folded_|coordinator::tests::)/)'
slow-timeout = { period = "60s", terminate-after = 4 }

# The mTLS pairing e2e provisions a real access cert store (3× RSA-2048
# keygen) and boots a TLS daemon before its first assertion — seconds of
# setup before any poll starts, more under load.
#
# (The routes_sessions/dashboard_control home-scan lanes that used to sit
# below are gone: their fixtures now inject tempdir session stores instead
# of walking the real ~/.intendant — tests-are-hermetic convention.)
[[profile.default.overrides]]
filter = 'test(/ctl_peer_mtls_pairing/)'
slow-timeout = { period = "120s", terminate-after = 3 }

# rustc-governor acceptance tests spawn the real governor binary plus
# /bin/sh fixtures and hand flock permits between processes with
# deliberately generous deadlines; pure fork/exec + scheduling headroom on
# a saturated box (same class as the worktree_inventory override above).
[[profile.default.overrides]]
filter = 'package(rustc-governor)'
slow-timeout = { period = "60s", terminate-after = 4 }

# The vendored D0-A corpus conformance gate (§D of the stamped P1 v1
# profile) runs all 170 stamped vectors through every structural layer
# plus semantics in ONE test — its unity IS the gate (any red vector
# reds the gate), and ~28s of debug-mode execution is its honest cost,
# not a stall. Deliberate heavy test, not an environment dependency.
[[profile.default.overrides]]
filter = 'package(owner-plane-reducer)'
slow-timeout = { period = "60s", terminate-after = 2 }
