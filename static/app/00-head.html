<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- viewport-fit=cover: layout extends under notches/home indicator so the
     env(safe-area-inset-*) vars in ui2-chrome.css get real values (they are
     0 otherwise and the chrome collides with hardware on phones). No
     user-scalable=no: pinch-zoom is an accessibility escape hatch — iOS
     focus-zoom is prevented by 16px input font, double-tap zoom by
     per-element touch-action:manipulation. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Intendant</title>
<link rel="icon" type="image/png" sizes="128x128" href="/icon-128.png" id="favicon">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0B0C10">
<script>
  // The ui-v2 chrome is the only generation (the v1 chrome + its
  // `?ui=v1` soak-period escape hatch were deleted post-soak). The
  // `.ui-v2` class stays on <html> as the permanent scoping namespace —
  // every chrome style is written under `html.ui-v2`, and stripping the
  // prefix from ~2k selectors would only lower their specificity.
  (function () {
    document.documentElement.classList.add('ui-v2');
    // Light theme (design-system import): browser-scoped preference,
    // stamped pre-paint so neither theme flashes.
    try {
      if (localStorage.getItem('intendant.ui2.theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', '#F5F6FB');
      }
    } catch (e) { /* private mode: dark */ }
  })();
</script>
