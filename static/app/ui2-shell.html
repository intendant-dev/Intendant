<!-- ── ui-v2 chrome: left nav rail + oversight bar ──────────────────────
     Rendered at body end (fixed-position), visible only under html.ui-v2.
     During the migration the v1 status/ticker/task strips stay live inside
     #app (bridge-painted): v1 JS keeps writing into them and the v2 chrome
     mirrors what it needs via observers (ui2-chrome.js) — v1 logic is
     never edited, only re-presented. The v1 .tab-bar alone is hidden: nav
     items below are .tab-btn[data-tab] so the existing router wires their
     clicks and active state exactly like the bar it replaces. -->

<nav id="ui2-nav" aria-label="Primary">
  <div class="ui2-nav-top">
    <div class="ui2-brand">
      <div class="ui2-brand-glyph"><div class="ui2-brand-inner"></div></div>
      <div class="ui2-brand-word ui2-nav-label">Intendant</div>
    </div>
    <button type="button" class="ui2-host-btn ui2-nav-label" id="ui2-host-btn"
            title="This daemon. Fleet controls live in Access → Daemons.">
      <span class="ui2-host-dot" id="ui2-host-dot"></span>
      <span class="ui2-host-meta">
        <span class="ui2-host-name" id="ui2-host-name">local</span>
        <span class="ui2-host-sub">this daemon</span>
      </span>
      <span class="ui2-host-chev" id="ui2-host-chev"></span>
    </button>
  </div>

  <div class="ui2-nav-groups" id="ui2-nav-groups"><!-- built by ui2-chrome.js --></div>

  <div class="ui2-nav-bottom">
    <button type="button" class="ui2-autonomy" id="ui2-autonomy-btn"
            title="Autonomy level — opens Settings">
      <span class="ui2-autonomy-icon" id="ui2-autonomy-icon"></span>
      <span class="ui2-nav-label ui2-autonomy-meta">
        <span class="ui2-autonomy-eyebrow">Autonomy</span>
        <span class="ui2-autonomy-level" id="ui2-autonomy-level">—</span>
      </span>
    </button>
    <div class="ui2-identity ui2-nav-label">
      <div class="ui2-identity-avatar" id="ui2-identity-avatar">·</div>
      <div class="ui2-identity-meta">
        <div class="ui2-identity-name" id="ui2-identity-name">—</div>
        <div class="ui2-identity-sub">this browser</div>
      </div>
    </div>
  </div>
</nav>

<header id="ui2-oversight">
  <div class="ui2-pill" id="ui2-phase-pill" data-cat="idle">
    <span class="ui2-pill-dot"></span>
    <span class="ui2-pill-text" id="ui2-phase-text">Idle</span>
  </div>
  <button type="button" class="ui2-stop" id="ui2-stop-btn" hidden
          title="Interrupt the current turn">
    <span class="ui2-stop-icon" id="ui2-stop-icon"></span>
    <span id="ui2-stop-label">Stop</span>
  </button>
  <div class="ui2-ovs-divider"></div>
  <div class="ui2-ovs-title-group">
    <span class="ui2-ovs-title" id="ui2-page-title">Activity</span>
    <span class="ui2-ovs-session" id="ui2-session-id"></span>
  </div>
  <div class="ui2-ovs-spacer"></div>
  <!-- Activity layout toggle: Focus (one centered timeline) vs Grid (the
       session-window grid + concurrent stream). CSS shows it only while
       the Activity tab is active (html[data-ui2-tab="activity"]);
       ui2-activity.js owns the state (html[data-ui2-layout] + localStorage). -->
  <div class="ui2-layout-toggle" id="ui2-layout-toggle" role="group" aria-label="Activity layout">
    <button type="button" id="ui2-layout-focus-btn" data-layout="focus"
            title="Focus — one centered timeline (session windows hidden)">Focus</button>
    <button type="button" id="ui2-layout-grid-btn" data-layout="grid"
            title="Grid — session windows with the concurrent stream below">Grid</button>
  </div>
  <div class="ui2-ctx ui2-ovs-compact-hide" id="ui2-ctx" title="Context budget used">
    <span class="ui2-ctx-label">Context</span>
    <div class="ui2-ctx-track"><div class="ui2-ctx-fill" id="ui2-ctx-fill"></div></div>
    <span class="ui2-ctx-pct" id="ui2-ctx-pct">0%</span>
  </div>
  <div class="ui2-ovs-divider ui2-ovs-compact-hide"></div>
  <button type="button" class="ui2-conn" id="ui2-conn" title="Dashboard transport — opens Access → Diagnostics">
    <span class="ui2-conn-dot" id="ui2-conn-dot"></span>
    <span class="ui2-conn-label ui2-ovs-compact-hide" id="ui2-conn-label">connecting…</span>
  </button>
  <button type="button" class="ui2-search" id="ui2-search-btn" title="Command palette">
    <span class="ui2-search-icon" id="ui2-search-icon"></span>
    <span class="ui2-ovs-compact-hide">Search</span>
    <span class="ui2-kbd" id="ui2-search-kbd">⌘K</span>
  </button>
</header>

<!-- ⌘K command palette (P1b). Backdrop blur is dropped while the Station
     pane is active — the blur-over-canvas discipline. -->
<div id="ui2-palette-backdrop" hidden>
  <div id="ui2-palette" role="dialog" aria-modal="true" aria-label="Command palette">
    <div class="ui2-palette-search">
      <span class="ui2-palette-search-icon" id="ui2-palette-search-icon"></span>
      <input id="ui2-palette-input" type="text" placeholder="Search screens…"
             autocomplete="off" spellcheck="false">
      <span class="ui2-kbd">ESC</span>
    </div>
    <div class="ui2-palette-eyebrow">Go to</div>
    <div id="ui2-palette-list" role="listbox"></div>
  </div>
</div>
