name: Cargo audit

# Runs `cargo audit` against the RustSec advisory DB so vulnerable transitive
# deps surface on every PR rather than only when someone notices.
#
# Also runs weekly on a schedule — new advisories land continuously, and the
# committed Cargo.lock can drift from "clean" without any code change.

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - ".cargo/audit.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - ".cargo/audit.toml"
      # Edits to this workflow validate themselves pre-merge (advisory
      # check, not required — a paths filter here can't wedge queue entry).
      - ".github/workflows/audit.yml"
  schedule:
    # Mondays at 08:00 UTC.
    - cron: "0 8 * * 1"

permissions:
  contents: read
  # rustsec/audit-check posts results back to GitHub:
  #   - `checks: write` lets it create a Check Run on PRs and push events
  #     (the annotated red/green status next to the commit).
  #   - `issues: write` lets the scheduled (cron) run open an issue when new
  #     advisories land against the existing lockfile.
  checks: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # The default persisted token grants every later step push access;
        # nothing in these jobs pushes.
        with:
          persist-credentials: false
      # Prebuilt cargo-audit binary (seconds) so audit-check below finds it on
      # PATH — its fallback is a cargo-install from source (~3 min per run).
      # rustsec/audit-check stays for the annotations / issue-filing behavior.
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-audit
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
