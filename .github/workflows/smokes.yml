name: Keyless smokes

# The live-fire subset of the landing battery that needs NO API keys and NO
# display: real binaries driven end to end by the scripted mock provider
# (PROVIDER=mock). These drivers were written keyless by design so they
# could one day gate landings — this workflow is that day. Coverage the
# unit suite structurally can't reach:
#
#   - session-vitals-smoke: daemon in a dirty git repo; asserts the vitals
#     event carries git + cache + limits sections end to end (this exact
#     smoke caught the usage-rail regression the TUI removal shipped —
#     2026-07-05 — a textually clean merge the unit suite waved through).
#   - native-goal-smoke: the /goal engine over the control socket (set,
#     steer notice, budget, honest failure on pause-without-goal).
#   - peer-sessions-smoke: two federated daemons; task delegated through the
#     primary; folded per-session state (label, phase lifecycle, is_primary
#     git vitals via the connect-time state replay) on /api/peers; retire on
#     stop. API mode only — the --browser leg needs real Chrome and stays a
#     local/canary check.
#
# The remaining battery legs (claude-code-e2e on live haiku, browser/Station
# probes) need keys or a display and deliberately stay OUT of the merge gate;
# they run as post-landing checks on operator hardware.
#
# Linux only: the drivers are platform-agnostic PROTOCOL probes (control
# socket, /ws, /api) — a second Unix platform mostly duplicates the same
# code paths while doubling the flake surface, and every flake costs a
# queue cycle. Platform-specific coverage lives in windows.yml's 3-OS
# unit+e2e matrix; the drivers need Unix control sockets and POSIX
# signals, so Linux is the natural single host. Debug profile for the
# same reason: the regressions these catch (e.g. the usage-rail miss)
# fire identically in debug, and --release only added build time.

# Required-check triggers only — unfiltered on purpose: a paths-skipped
# required check blocks queue entry (PRs) or wedges the group
# (merge_group). See windows.yml for the full rationale. There is
# deliberately NO push trigger (dropped 2026-07-07): the merge-group run
# just built and ran these exact smokes on the identical tree, and the
# constant PR + group flow keeps the runner's debug tree warm — the
# push-side rerun burned ~7 minutes of dell capacity per landing for no
# new signal.
on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: keyless-smokes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smokes:
    name: smokes (${{ matrix.os }})
    # Trust-based routing — same rule as windows.yml: trusted refs run on
    # the self-hosted fleet, fork PRs route to GitHub-hosted runners
    # (`matrix.os` doubles as the hosted label) so external code never
    # executes on our hardware while its required checks still really run.
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && matrix.os || matrix.runner }}
    env:
      # Match windows.yml's Linux leg so this job shares the runner's warm
      # incremental tree with the test job instead of maintaining a second
      # debuginfo-flavored artifact chain. The smokes probe protocol
      # behavior, which debuginfo doesn't change.
      CARGO_PROFILE_DEV_DEBUG: "0"
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # `os` is the pinned check-name key and the fork-PR hosted label;
        # `runner` is the self-hosted fleet placement. The smokes land on
        # any Linux instance (same label as the test jobs): the drivers
        # use kernel-assigned ports (`--web 0`, parsed from the daemon's
        # output) and pid-keyed control sockets, so concurrent smoke jobs
        # on one machine can't collide or cross-talk. (They previously
        # bound fixed ports and pinned to a dedicated one-instance-per-box
        # intendant-smokes-linux label — that serialization is gone; the
        # label can be retired from the runner config.) Provisioning steps
        # gate on runner.environment. See windows.yml for the full
        # rationale.
        include:
          - os: ubuntu-latest
            runner: [self-hosted, intendant-linux]
            target: x86_64-unknown-linux-gnu

    steps:
      # Fleet preflight — same rationale as windows.yml: fail fast on a
      # nearly-full disk (ENOSPC mid-compile reads as toolchain corruption),
      # warn on pathological load. This matrix is unix-only so one bash
      # step suffices; hosted runners skip it.
      - name: Fleet preflight
        if: runner.environment != 'github-hosted'
        shell: bash
        run: |
          avail_kb=$(df -Pk . | awk 'NR==2 {print $4}')
          avail_gb=$((avail_kb / 1024 / 1024))
          echo "disk available: ${avail_gb}G"
          if [ "$avail_gb" -lt 20 ]; then
            echo "::error::fleet preflight: only ${avail_gb}G free on this runner — below the 20G floor. Reclaim disk (merged worktrees' target/ dirs are the usual culprits) and rerun."
            exit 1
          fi
          cores=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          load=$(awk '{print $1}' /proc/loadavg 2>/dev/null || sysctl -n vm.loadavg | awk '{print $2}')
          echo "load average: $load (cores: $cores)"
          awk -v l="$load" -v c="$cores" 'BEGIN { if (l > 3*c) print "::warning::fleet preflight: load " l " is over 3x the " c " cores — timing-sensitive tests may flake; consider draining the box" }'

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # Doc-only diffs don't need a release build + smoke rigs. Same in-job
      # relevance detection as windows.yml (a paths: filter on a required
      # workflow blocks queue entry; an in-job skip still reports green).
      # Pure git — the fleet boxes have no gh CLI; this matrix is
      # unix-only so one bash step suffices.
      - name: Detect CI-relevant changes
        id: relevance
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.merge_group.base_sha }}"
          fi
          git fetch --quiet --depth=1 origin "$base"
          relevant=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*|*.md|LICENSE|.gitignore) ;;
              *) relevant=true; break ;;
            esac
          done < <(git diff --name-only "$base" HEAD)
          echo "relevant=$relevant" >> "$GITHUB_OUTPUT"
          echo "CI-relevant change detected: $relevant"

      # Same native build deps as windows.yml's test job — the release
      # build compiles the identical dependency set. Hosted-only: the
      # self-hosted boxes are pre-provisioned, and the runner user has
      # no sudo.
      - name: Install Linux build deps
        if: runner.environment == 'github-hosted' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libclang-dev libvpx-dev libpipewire-0.3-dev \
            libxcb1-dev libxcb-shm0-dev libxcb-randr0-dev

      # peer-rig.py drives stop_session over a raw WebSocket. A venv
      # sidesteps PEP 668 (externally-managed pythons reject bare pip
      # installs); prepending its bin to GITHUB_PATH makes it the
      # `python3` later steps get. Cheap and idempotent, so it runs on
      # every runner class.
      - name: Install python websockets
        run: |
          python3 -m venv "$RUNNER_TEMP/pyws"
          "$RUNNER_TEMP/pyws/bin/pip" install --quiet websockets
          echo "$RUNNER_TEMP/pyws/bin" >> "$GITHUB_PATH"

      # Hosted-only: self-hosted runners keep a persistent target/.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: runner.environment == 'github-hosted'
        with:
          key: smokes-${{ matrix.target }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Debug profile: the smokes probe protocol behavior, which the
      # profile doesn't change, and this shares the warm debug tree with
      # local `cargo test` builds instead of maintaining a second release
      # tree per checkout. `--locked` mirrors windows.yml.
      - name: cargo build
        if: steps.relevance.outputs.relevant != 'false'
        run: cargo build -p intendant --bins --locked

      - name: session-vitals smoke
        if: steps.relevance.outputs.relevant != 'false'
        run: node tests/skills/session-vitals-smoke/driver.cjs "$GITHUB_WORKSPACE/target/debug/intendant"

      - name: native-goal smoke
        if: steps.relevance.outputs.relevant != 'false'
        run: node tests/skills/native-goal-smoke/driver.cjs "$GITHUB_WORKSPACE/target/debug/intendant"

      - name: peer-sessions smoke
        if: steps.relevance.outputs.relevant != 'false'
        env:
          INTENDANT_BIN: ${{ github.workspace }}/target/debug/intendant
        run: python3 tests/skills/peer-sessions-smoke/peer-rig.py
