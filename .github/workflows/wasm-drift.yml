name: WASM drift

# The committed WASM artifacts (static/wasm-web, static/wasm-station) are
# build outputs of crates/{presence-web,station-web}: an agent that edits
# the crates (or their shared dep presence-core) without rebuilding ships
# a dashboard whose Rust changed but whose WASM didn't — silent drift no
# suite can see (build.rs's staleness check is mtime-based, which a fresh
# CI checkout defeats). This gate rebuilds both crates with the PINNED
# wasm-pack + the PINNED toolchain and fails on any byte difference
# against the committed artifacts.
#
# Required-track triggers (unfiltered — a paths-filtered required check
# blocks queue entry). Relevance is two-tier: a GitHub-hosted classifier
# job reads the diff first, so irrelevant diffs skip the Mac leg without
# ever occupying a fleet runner slot (or queueing behind the heavy
# cross-platform Mac job); the in-job relevance check is retained as the
# fail-open backstop — if the classifier fails, the Mac job runs anyway
# and decides locally, exactly like the old single-job scheme.
#
# The rebuild runs on the MAC fleet leg deliberately: wasm output is NOT
# byte-deterministic across host triples (proven live 2026-07-11 — a
# comment-only probe's Linux rebuild differed from the macOS-built
# committed artifacts down to the .d.ts glue). All wasm authorship and
# build.rs's auto-rebuilds happen on aarch64-darwin, so that is the
# canonical artifact host, and the gate must rebuild on the same triple
# to verify bytes. A contributor regenerating artifacts on another OS
# will red this gate — rebuild them on macOS (or let a Mac dev box's
# cargo build do it via build.rs).
on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: wasm-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Tier 1: hosted relevance classifier. Runs on GitHub-hosted
  # ubuntu-latest (free for a public repo; fork-safe — it only reads the
  # diff) so the ~88% of PRs that touch no wasm input never occupy a Mac
  # fleet slot at all.
  classify:
    name: wasm-relevance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      relevant: ${{ steps.relevance.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # The default persisted token grants every later step push access;
        # nothing here pushes.
        with:
          persist-credentials: false

      # Only wasm inputs can drift the artifacts; everything else
      # green-skips. Cargo.lock is in the list because dependency bumps
      # (wasm-bindgen above all) change the emitted bytes;
      # scripts/build-wasm.sh because the canonical builder's flags shape
      # the bytes too; and this workflow file itself so edits to the gate
      # validate the full fleet path live instead of green-skipping
      # themselves. Keep the pattern list identical to the in-job
      # backstop copy in the wasm-drift job below.
      - name: Detect wasm-relevant changes
        id: relevance
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.merge_group.base_sha }}"
          fi
          git fetch --quiet --depth=1 origin "$base"
          relevant=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              crates/presence-web/*|crates/station-web/*|crates/presence-core/*|static/wasm-web/*|static/wasm-station/*|.wasm-pack-version|rust-toolchain.toml|Cargo.lock|.github/workflows/wasm-drift.yml|scripts/build-wasm.sh)
                relevant=true; break ;;
            esac
          done < <(git diff --name-only "$base" HEAD)
          echo "relevant=$relevant" >> "$GITHUB_OUTPUT"
          echo "wasm-relevant change detected: $relevant"

  # Tier 2: the drift gate proper, on the Mac fleet, gated on the hosted
  # classifier: an irrelevant diff skips this job entirely, and a job
  # skipped via `if:` reports a "skipped" check run, which the ruleset
  # reads as satisfied — correct for irrelevant diffs. The gate fails
  # OPEN to testing: if classify fails or is cancelled, `always()` plus
  # the result check below run this job anyway, and the retained in-job
  # relevance step decides locally exactly like the old single-job
  # scheme — a silent classifier crash can never mask a relevant diff,
  # which is what makes the skipped-equals-satisfied semantics safe here.
  wasm-drift:
    name: wasm-drift (${{ matrix.os }})
    needs: classify
    if: always() && (needs.classify.result != 'success' || needs.classify.outputs.relevant == 'true')
    # Trust-based routing — same rule as windows.yml: trusted refs on the
    # self-hosted fleet, fork PRs on GitHub-hosted runners.
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && matrix.os || matrix.runner }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: macos-latest
            runner: [self-hosted, intendant-macos]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # The default persisted token grants every later step push access;
        # nothing here pushes.
        with:
          persist-credentials: false

      # In-job backstop for the fail-open path: when classify fails,
      # this job runs unconditionally and this step decides relevance
      # locally, exactly like the pre-classifier scheme. Keep the pattern
      # list identical to the classify copy above (per-entry rationale
      # lives there).
      - name: Detect wasm-relevant changes
        id: relevance
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.merge_group.base_sha }}"
          fi
          git fetch --quiet --depth=1 origin "$base"
          relevant=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              crates/presence-web/*|crates/station-web/*|crates/presence-core/*|static/wasm-web/*|static/wasm-station/*|.wasm-pack-version|rust-toolchain.toml|Cargo.lock|.github/workflows/wasm-drift.yml|scripts/build-wasm.sh)
                relevant=true; break ;;
            esac
          done < <(git diff --name-only "$base" HEAD)
          echo "relevant=$relevant" >> "$GITHUB_OUTPUT"
          echo "wasm-relevant change detected: $relevant"

      # Same external per-listener cache scheme as the other fleet jobs —
      # the wasm target artifacts key alongside the native ones.
      - name: External cargo target dir
        if: runner.environment != 'github-hosted' && steps.relevance.outputs.relevant == 'true'
        shell: bash
        run: |
          key=$(rustc -V | tr ' ()' '_')
          dir="$HOME/.cache/intendant-ci/target/${RUNNER_NAME:-listener}-${key}"
          mkdir -p "$dir"
          touch "$dir/.last-used"
          echo "CARGO_TARGET_DIR=$dir" >> "$GITHUB_ENV"
          echo "cargo target dir: $dir"

      # The pinned wasm-pack, installed on first use per runner account
      # (~/.cargo/bin persists on the fleet; hosted runners pay the
      # install only when a fork PR actually touches wasm inputs).
      #
      # Install + rebuild run under ONE flock on the account's cache dir:
      # both Mac listeners share ~/Library/Caches/.wasm-pack, and two cold
      # jobs cargo-installing wasm-bindgen concurrently race the final
      # rename into that cache ("Directory not empty", live 2026-07-11).
      # This was first serialized with a repo-wide job concurrency group —
      # WRONG: GitHub keeps only ONE pending job per group, so each newly
      # arriving gate job CANCELS the previously pending one, and a
      # cancelled required check fails innocent PRs (live 2026-07-12). An
      # flock queues honestly: concurrent jobs wait (minutes at worst),
      # nothing is cancelled, and single-tenant hosted runners sail
      # through uncontended.
      - name: Install pinned wasm-pack + rebuild artifacts (serialized)
        if: steps.relevance.outputs.relevant == 'true'
        shell: bash
        run: |
          python3 - <<'PYLOCK'
          import fcntl, os, subprocess, sys
          lockpath = os.path.expanduser("~/.cache/intendant-ci/wasm-rebuild.lock")
          os.makedirs(os.path.dirname(lockpath), exist_ok=True)
          fh = open(lockpath, "w")
          fcntl.flock(fh, fcntl.LOCK_EX)
          body = '''
          set -euo pipefail
          want=$(cat .wasm-pack-version)
          have=$(wasm-pack --version 2>/dev/null | awk '{print $2}' || true)
          if [ "$have" != "$want" ]; then
            cargo install wasm-pack --version "$want" --locked
          fi
          wasm-pack --version
          bash scripts/build-wasm.sh
          '''
          sys.exit(subprocess.call(["bash", "-c", body]))
          PYLOCK

      # (The rebuild itself goes through scripts/build-wasm.sh inside the
      # serialized step above — the canonical builder carries the
      # registry-path remap that makes artifact bytes account-independent.)

      - name: Committed artifacts must match the rebuild
        if: steps.relevance.outputs.relevant == 'true'
        shell: bash
        run: |
          if ! git diff --exit-code -- static/wasm-web static/wasm-station; then
            echo "::error::WASM artifacts drift from their crates — rebuild with the pinned wasm-pack (a normal cargo build does it via build.rs on a dev box, or use the manual commands in CLAUDE.md) and commit the result."
            exit 1
          fi
          untracked=$(git status --porcelain -- static/wasm-web static/wasm-station | grep '^??' || true)
          if [ -n "$untracked" ]; then
            echo "::error::the rebuild produced files the tree does not track:"
            echo "$untracked"
            exit 1
          fi
