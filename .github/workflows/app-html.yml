name: app.html assembly

# static/app.html is a generated artifact: build.rs assembles it from the
# static/app/ fragments via crates/app-html-assembler. windows.yml's paths
# filter deliberately skips static-asset pushes (they can't break a compile),
# so this small job is the regen gate for exactly those pushes: rerun the
# real assembler and fail if the committed artifact doesn't match the
# committed fragments — a hand-edit to the generated file, a forgotten
# regeneration, or manifest ↔ directory drift (the assembler itself fails
# closed on that). The assembler is std-only, so this compiles and runs in
# seconds; no cache needed.

on:
  push:
    branches: [main]
    paths:
      - "static/app/**"
      - "static/app.html"
      - "crates/app-html-assembler/**"
      - "build.rs"
      - ".github/workflows/app-html.yml"
  # Required-check triggers — unfiltered on purpose: a paths-skipped
  # required check blocks queue entry (PRs) or wedges the group
  # (merge_group); see windows.yml. The assembler runs in seconds.
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: app-html-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regen-check:
    name: fragments match artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # The default persisted token grants every later step push access;
        # nothing in these jobs pushes.
        with:
          persist-credentials: false

      - name: Assemble static/app.html from fragments
        run: cargo run -p app-html-assembler --locked

      - name: Committed artifact matches committed fragments
        run: git diff --exit-code static/app.html
