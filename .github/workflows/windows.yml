name: Cross-platform tests

# Runs the unit-test suite (`cargo test --bins`) for both binaries on every
# supported platform so cross-platform regressions surface in CI rather than
# only when someone builds on a non-Linux box.
#
# Windows is the point: the codebase is mostly developed on macOS/Linux, and
# Unix-only APIs and path assumptions slip in unnoticed because they compile
# — and pass tests — fine on the author's machine. This workflow started as
# `cargo check` only, on the theory that the Windows runtime can't be
# exercised on a headless runner. That theory is disproven: the full suite
# passes on a headless Windows Server box (2026-07, the win_sandbox
# verification), including the restricted-token/ACL sandbox tests and the
# real-PTY tests. That first full-suite run on real Windows also surfaced
# seven Unix-only test/product bugs that `cargo check` had waved through
# (hardcoded `/tmp`, Unix absolute paths in fixtures, `HOME` vs
# `USERPROFILE`, env-var test races) — running the tests here is what keeps
# that class of debt from re-accumulating, since Windows dev boxes only
# exist transiently in this project.
#
# Unit tests need no API keys and no display (inline #[cfg(test)] modules —
# the tests/skills/ real-LLM scenarios stay out of CI by design). The
# tests/e2e suite runs here too: it spawns the real binaries against the
# scripted mock provider (PROVIDER=mock), so it is equally keyless and
# headless while covering the CLI → loop → sandboxed-runtime path end to
# end on every platform.
#
# Since 2026-07-11 this workflow is also the WHOLE Linux gate: the keyless
# smokes and the dashboard-boot probe run as tail steps of the Linux leg,
# reusing its checkout and warm build tree. They were smokes.yml's two
# jobs (deleted in the same change; the separate `smokes (ubuntu-latest)`
# required context was retired from the ruleset, and dashboard-boot —
# advisory since birth — was promoted into the required gate on its
# 40/40-green soak record). Collapsing 3 Linux jobs into 1 returns two
# runner slots per entry and removes two duplicate checkout+build cycles.

on:
  # NO push trigger (dropped 2026-07-10, after the external per-listener
  # target caches landed): the push-to-main run was a check-only "warm
  # pass" whose only value was compile warmth, and the constant PR +
  # merge-group flow keeps the external caches warm without it — the
  # merge-group run just validated the identical tree. Same reasoning
  # that removed smokes.yml's push trigger on 2026-07-07 (~8 fleet
  # runner-minutes returned per landing).
  #
  # Required-check trigger #1 — deliberately unfiltered. This job is a
  # required status check, and GitHub only lets a PR *enter* the merge
  # queue once its own required checks have passed: a paths-skipped
  # required check leaves the PR BLOCKED at "Expected" forever (verified
  # live on the first docs-only PR through this repo's queue). Every PR
  # pays the full matrix; that is the price of a required check.
  pull_request:
    branches: [main]
  # Required-check trigger #2 — the merge-queue revalidation against the
  # speculative merge state (main + everything queued ahead). merge_group
  # events don't support paths filtering anyway.
  merge_group:

permissions:
  contents: read

# Don't pile up redundant runs on a fast-moving branch: a newer push to the
# same ref cancels the in-flight run.
concurrency:
  group: cross-platform-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    # Trust-based routing: our own refs (pushes, merge-queue refs, same-repo
    # PRs — every agent landing) run on the self-hosted fleet for speed;
    # fork PRs run on GitHub-hosted runners so external code never executes
    # on our hardware, while still getting real required-check results
    # (a skipped check would read as satisfied — routing closes that hole).
    # `matrix.os` doubles as the hosted runner label. Fork-PR workflows
    # additionally sit behind the repo's all-outside-collaborators approval
    # gate, so nothing runs anywhere without a maintainer's click.
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && matrix.os || matrix.runner }}
    env:
      # CI needs pass/fail and panic messages, not debugger-grade binaries.
      # Debug info is the dominant compile+link cost across these large
      # test binaries, so every leg builds without it (Linux measured ~95%
      # compile+link vs ~12s of test execution when it joined 2026-07-07;
      # macOS joined 2026-07-10 — its merge-group full suite was the last
      # debuginfo=2 build in the gate). Repro locally with default
      # debuginfo when a CI backtrace is too thin.
      CARGO_PROFILE_DEV_DEBUG: ${{ matrix.cargo_debug }}
    # Full test builds are much heavier than the old `cargo check`; a cold
    # Windows runner can take a while, but a hung run shouldn't burn hours
    # — and with no per-test timeout under plain `cargo test`, one hung
    # test otherwise holds a queue slot for the whole budget (2026-07-10's
    # display-enumeration hang held the Mac runner ~15 min per entry only
    # because an operator intervened). 60 covers a cold self-hosted build
    # with margin; tighten toward 45 at the post-toolchain-pin re-baseline.
    timeout-minutes: 60
    strategy:
      # One platform failing shouldn't mask the others — we want to see every
      # target's result on a regression.
      fail-fast: false
      matrix:
        # `os` is the check-name key ("test (ubuntu-latest)" is pinned as a
        # required context in the main ruleset — renaming it means a
        # coordinated ruleset edit) AND the hosted-runner label fork PRs
        # route to; `runner` is the self-hosted fleet placement for trusted
        # refs (dell-206, macbook-vm, samsung-win — build state persists in
        # the external per-listener target cache set up below; the
        # in-workspace target/ is wiped by checkout's `git clean -ffdx`
        # every job, so warmth never lives there). Provisioning steps
        # (dep installs, cache actions) gate on `runner.environment ==
        # 'github-hosted'`: the fleet boxes are pre-provisioned and keep
        # their build state.
        include:
          - os: windows-latest
            runner: [self-hosted, intendant-windows]
            target: x86_64-pc-windows-msvc
            cargo_debug: "0"
          - os: macos-latest
            runner: [self-hosted, intendant-macos]
            target: aarch64-apple-darwin
            cargo_debug: "0"
          - os: ubuntu-latest
            runner: [self-hosted, intendant-linux]
            target: x86_64-unknown-linux-gnu
            cargo_debug: "0"

    steps:
      # Fleet preflight: a self-hosted box with a nearly-full disk produces
      # resource-kill "could not compile" failures with zero rustc
      # diagnostics that read as toolchain corruption (a 2026-07-06 ENOSPC
      # mid-compile burned three gate cycles before anyone suspected disk).
      # Fail fast with the real reason instead. Load is reported but only
      # warned on — it is spiky and self-correcting, disk is not. Hosted
      # runners are ephemeral and provisioned per-run; they skip this.
      - name: Fleet preflight (unix)
        if: runner.environment != 'github-hosted' && runner.os != 'Windows'
        shell: bash
        run: |
          avail_kb=$(df -Pk . | awk 'NR==2 {print $4}')
          avail_gb=$((avail_kb / 1024 / 1024))
          echo "disk available: ${avail_gb}G"
          if [ "$avail_gb" -lt 20 ]; then
            echo "::error::fleet preflight: only ${avail_gb}G free on this runner — below the 20G floor. Reclaim disk (merged worktrees' target/ dirs are the usual culprits) and rerun."
            exit 1
          fi
          cores=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          load=$(awk '{print $1}' /proc/loadavg 2>/dev/null || sysctl -n vm.loadavg | awk '{print $2}')
          echo "load average: $load (cores: $cores)"
          awk -v l="$load" -v c="$cores" 'BEGIN { if (l > 3*c) print "::warning::fleet preflight: load " l " is over 3x the " c " cores — timing-sensitive tests may flake; consider draining the box" }'

      - name: Fleet preflight (windows)
        if: runner.environment != 'github-hosted' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $drive = (Get-Location).Path.Substring(0, 1)
          $freeGB = [math]::Floor((Get-PSDrive $drive).Free / 1GB)
          Write-Host "disk available: ${freeGB}G on ${drive}:"
          if ($freeGB -lt 20) {
            Write-Host "::error::fleet preflight: only ${freeGB}G free on ${drive}: — below the 20G floor. Reclaim disk (merged worktrees' target/ dirs are the usual culprits) and rerun."
            exit 1
          }

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # The default persisted token grants every later step push access;
        # nothing in these jobs pushes.
        with:
          persist-credentials: false

      # Fleet build state lives OUTSIDE the workspace: checkout
      # (clean: true) runs `git clean -ffdx` at the start of every job, so
      # an in-tree target/ restarts cold each run — the "persistent
      # target/" this file used to describe never actually survived a
      # checkout. The external cache is per-listener (concurrent listeners
      # on one host must not share — same-name artifacts clobber each
      # other) and keyed by `rustc -V` (a toolchain bump starts a fresh
      # key instead of thrashing the old one). `.last-used` is the recency
      # marker the fleet watchdog prunes stale keys by (scripts/ci).
      # Hosted runners skip this and keep the rust-cache action below.
      - name: External cargo target dir (unix)
        if: runner.environment != 'github-hosted' && runner.os != 'Windows'
        shell: bash
        run: |
          key=$(rustc -V | tr ' ()' '_')
          dir="$HOME/.cache/intendant-ci/target/${RUNNER_NAME:-listener}-${key}"
          mkdir -p "$dir"
          touch "$dir/.last-used"
          echo "CARGO_TARGET_DIR=$dir" >> "$GITHUB_ENV"
          echo "cargo target dir: $dir"

      - name: External cargo target dir (windows)
        if: runner.environment != 'github-hosted' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $key = (rustc -V) -replace '[ ()]', '_'
          $name = if ($env:RUNNER_NAME) { $env:RUNNER_NAME } else { 'listener' }
          $dir = Join-Path $env:LOCALAPPDATA "intendant-ci\target\$name-$key"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          New-Item -ItemType File -Force -Path (Join-Path $dir '.last-used') | Out-Null
          "CARGO_TARGET_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "cargo target dir: $dir"

      # rustup ships preinstalled on the GitHub-hosted runners; just pin the
      # target this job type-checks against.
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # Doc-only diffs don't need a 13-minute build. Detect relevance INSIDE
      # the job so the required check still runs and reports green — a
      # `paths:` filter on a required workflow would block queue entry
      # instead (verified live on this repo's first docs-only PR). The
      # safe-list is deliberately tiny and inverted: anything not clearly
      # documentation counts as CI-relevant. Pure git against the checkout
      # (fetch the base at depth 1, two-dot diff): the fleet boxes have no
      # gh CLI and the Windows box resolves no `bash`, so the step exists
      # per shell and later steps AND the two outputs together (a skipped
      # step's output is empty, which passes the != 'false' tests).
      - name: Detect CI-relevant changes (unix)
        id: relevance_unix
        if: runner.os != 'Windows' && (github.event_name == 'pull_request' || github.event_name == 'merge_group')
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.merge_group.base_sha }}"
          fi
          git fetch --quiet --depth=1 origin "$base"
          relevant=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*|*.md|LICENSE|.gitignore) ;;
              *) relevant=true; break ;;
            esac
          done < <(git diff --name-only "$base" HEAD)
          echo "relevant=$relevant" >> "$GITHUB_OUTPUT"
          echo "CI-relevant change detected: $relevant"

      - name: Detect CI-relevant changes (windows)
        id: relevance_win
        if: runner.os == 'Windows' && (github.event_name == 'pull_request' || github.event_name == 'merge_group')
        shell: pwsh
        run: |
          $base = if ($env:GITHUB_EVENT_NAME -eq 'pull_request') {
            '${{ github.event.pull_request.base.sha }}'
          } else {
            '${{ github.event.merge_group.base_sha }}'
          }
          git fetch --quiet --depth=1 origin $base
          $files = git diff --name-only $base HEAD
          $relevant = 'false'
          foreach ($f in $files) {
            if (-not $f) { continue }
            if ($f -like 'docs/*' -or $f -like '*.md' -or $f -eq 'LICENSE' -or $f -eq '.gitignore') { continue }
            $relevant = 'true'; break
          }
          "relevant=$relevant" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Output "CI-relevant change detected: $relevant"

      # `ring` (our TLS provider — aws-lc-rs is deliberately disabled) builds
      # its x86_64 perlasm assembly with NASM on the MSVC target. Hosted-only,
      # like the other provisioning steps: the self-hosted Windows box has
      # NASM preinstalled on the machine PATH, and its runner user neither
      # has nor needs choco.
      - name: Install NASM (Windows, for ring)
        if: runner.environment == 'github-hosted' && runner.os == 'Windows'
        run: |
          if (-not (Get-Command nasm -ErrorAction SilentlyContinue)) {
            choco install nasm --no-progress -y
            "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
        shell: pwsh

      # Linux build deps for the `-sys` crates that have a native backend
      # there (the subset of scripts/setup-linux.sh's APT_PACKAGES that are
      # build-time, not runtime): libclang for the bindgen used by
      # env-libvpx-sys + pipewire-sys, libvpx + libpipewire + libxcb headers
      # for those crates' link/pkg-config steps. (No libssl-dev / libpng-dev:
      # the tree is on pure-Rust ring + the `png` crate, not openssl-sys /
      # libpng.) Hosted-only: the self-hosted boxes are pre-provisioned and
      # the runner user deliberately has no sudo.
      - name: Install Linux build deps
        if: runner.environment == 'github-hosted' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libclang-dev libvpx-dev libpipewire-0.3-dev \
            libxcb1-dev libxcb-shm0-dev libxcb-randr0-dev

      # macOS build deps. `env-libvpx-sys` (the VP8 encoder backend) is gated to
      # non-Windows, so the aarch64-apple-darwin target *does* build it and its
      # build.rs runs `pkg-config --libs --cflags vpx`. The GitHub macos-latest
      # image ships neither pkg-config nor a `vpx.pc`; on a dev box setup-macos.sh
      # pulls both in transitively via `brew install ffmpeg`. Install them
      # directly here (leaner than all of ffmpeg). The other macOS FFI deps
      # (ScreenCaptureKit, VideoToolbox, CoreFoundation) are system frameworks
      # already present on the runner image. Hosted-only: the self-hosted Mac
      # is a provisioned dev box.
      - name: Install macOS build deps
        if: runner.environment == 'github-hosted' && runner.os == 'macOS'
        run: brew install pkg-config libvpx

      # Restore the cargo cache on every run, but only *save* it on pushes to
      # main. PR caches live in an isolated scope GitHub discards on merge, so
      # saving them buys nothing — and the Windows tar/zstd save step is flaky
      # enough to fail an otherwise-green job. `save-if` keeps the speed-up on
      # restore while removing the unreliable post-run save from PR checks.
      # Hosted-only: the self-hosted runners keep their build state in the
      # external per-listener cargo target dir set up above — shipping it
      # to GitHub's cache store would only add minutes.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: runner.environment == 'github-hosted'
        with:
          key: ${{ matrix.target }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Fast pre-queue signal vs the real merge gate. Full suites run in
      # exactly two places: the merge group (all three platforms — the
      # actual gate, revalidating the speculative merge state) and the
      # Linux pull_request leg (the one pre-queue runtime signal — most
      # test failures are platform-agnostic, and catching them before the
      # queue saves a far more expensive group ejection). The non-Linux
      # PR legs run this compile check only (since 2026-07:
      # cross-platform compile breakage is the dominant non-Linux
      # regression class, and the single Mac hosts both mac runner
      # instances PLUS the interactive agents — stacked full-suite runs
      # starved the label queue at ~55-minute waits). Push-to-main runs
      # are gone entirely (2026-07-10, the `on:` comment).
      - name: cargo check (fast path)
        if: github.event_name != 'merge_group' && runner.os != 'Linux' && steps.relevance_unix.outputs.relevant != 'false' && steps.relevance_win.outputs.relevant != 'false'
        run: |
          cargo check -p intendant --bins --locked --target ${{ matrix.target }}
          cargo check -p intendant-core -p intendant-display -p intendant-platform --tests --locked --target ${{ matrix.target }}

      # Build and run the unit tests of the whole `intendant` package — both
      # binaries (the `intendant` controller and the `intendant-runtime`
      # executor) and their shared modules — for this target. `--bins` is the
      # same invocation the repo docs prescribe locally; `-p intendant`
      # deliberately excludes the wasm workspace members (`presence-web`,
      # `station-web`), which have their own wasm-pack builds and don't build
      # against a native target.
      # `--locked` makes lockfile drift a hard failure: CI must test exactly
      # the dependency set main pins, never a silent re-resolution of it.
      - name: cargo test
        if: (github.event_name == 'merge_group' || (runner.os == 'Linux' && github.event_name == 'pull_request')) && steps.relevance_unix.outputs.relevant != 'false' && steps.relevance_win.outputs.relevant != 'false'
        run: |
          cargo test -p intendant --bins --locked --target ${{ matrix.target }}
          # Lib crates get their own invocation: a global `--bins` filter
          # silently no-ops packages that have no bin targets, which is
          # how the core/display lib tests went dark after extraction.
          cargo test -p intendant-core -p intendant-display -p intendant-platform --locked --target ${{ matrix.target }}

      # Headless end-to-end: the real `intendant` + `intendant-runtime`
      # binaries driven by the scripted mock provider (see tests/e2e/main.rs).
      # No keys, no network, no display — exercises the production stack the
      # unit suite can't reach (process spawn, sandbox, tool round-trips,
      # session logging).
      - name: cargo test e2e (mock provider, headless)
        if: (github.event_name == 'merge_group' || (runner.os == 'Linux' && github.event_name == 'pull_request')) && steps.relevance_unix.outputs.relevant != 'false' && steps.relevance_win.outputs.relevant != 'false'
        run: cargo test -p intendant --test e2e --locked --target ${{ matrix.target }}

      # ── Quality gates (Linux leg; baselines zeroed 2026-07-11) ──────
      # fmt is platform-independent, so one leg suffices. clippy is
      # cfg-sensitive: the macOS-cut baseline left the Linux-only cfg
      # surface unproven, so it started report-only; the Linux delta was
      # zeroed (30 warnings — cfg-shadowed dead code gated, mechanical
      # rewrites, established-signature allows) and verified with the
      # exact gate incantation on the fleet's Linux toolchain in the
      # same change that flipped this to -D warnings. Both ride the
      # required Linux context; no ruleset change. Non-test targets
      # only: --all-targets has its own unzeroed baseline (tracked in
      # the CI hardening program).
      - name: cargo fmt --check
        if: runner.os == 'Linux' && steps.relevance_unix.outputs.relevant != 'false'
        run: cargo fmt --all --check

      - name: cargo clippy (-D warnings)
        if: runner.os == 'Linux' && steps.relevance_unix.outputs.relevant != 'false'
        run: cargo clippy --workspace --locked --target ${{ matrix.target }} -- -D warnings

      # ── Linux gate tail: keyless smokes + dashboard-boot ──────────────
      # Formerly smokes.yml's two jobs (deleted 2026-07-11 — coverage
      # rationale preserved in its git history): the live-fire subset of
      # the landing battery that needs NO API keys and NO display — real
      # binaries driven end to end by the scripted mock provider.
      #   - session-vitals-smoke: daemon in a dirty git repo; vitals event
      #     carries git + cache + limits sections end to end.
      #   - native-goal-smoke: the /goal engine over the control socket.
      #   - peer-sessions-smoke: two federated daemons, task delegation,
      #     folded per-session state on /api/peers. API mode only.
      #   - dashboard-boot: the SPA booted from a keyless mock daemon in
      #     headless Chromium over raw CDP (scripts/smoke-dashboard-boot.cjs)
      #     — born advisory 2026-07-09 after a cross-fragment TDZ error
      #     killed the SPA silently under all-green gates; PROMOTED into
      #     the required gate 2026-07-11 on a 40/40-green soak record.
      # Linux-only (the drivers are platform-agnostic protocol probes over
      # Unix control sockets; a second platform duplicates coverage while
      # doubling flake surface), and the Linux leg runs full on both
      # pull_request and merge_group, so `runner.os == 'Linux'` +
      # relevance is the whole gate here.

      # peer-rig.py drives stop_session over a raw WebSocket. A venv
      # sidesteps PEP 668 (externally-managed pythons reject bare pip
      # installs); prepending its bin to GITHUB_PATH makes it the
      # `python3` later steps get.
      - name: Install python websockets (smokes)
        if: runner.os == 'Linux' && steps.relevance_unix.outputs.relevant != 'false'
        run: |
          python3 -m venv "$RUNNER_TEMP/pyws"
          "$RUNNER_TEMP/pyws/bin/pip" install --quiet websockets
          echo "$RUNNER_TEMP/pyws/bin" >> "$GITHUB_PATH"

      # The real binaries for the smoke rigs — incremental on top of the
      # test/e2e build above (same target dir, same profile): seconds,
      # not a second build. Debug profile deliberately (the smokes probe
      # protocol behavior, which the profile doesn't change).
      - name: cargo build (smoke binaries)
        if: runner.os == 'Linux' && steps.relevance_unix.outputs.relevant != 'false'
        run: cargo build -p intendant --bins --locked --target ${{ matrix.target }}

      - name: session-vitals smoke
        if: runner.os == 'Linux' && steps.relevance_unix.outputs.relevant != 'false'
        run: node tests/skills/session-vitals-smoke/driver.cjs "${CARGO_TARGET_DIR:-$GITHUB_WORKSPACE/target}/${{ matrix.target }}/debug/intendant"

      - name: native-goal smoke
        if: runner.os == 'Linux' && steps.relevance_unix.outputs.relevant != 'false'
        run: node tests/skills/native-goal-smoke/driver.cjs "${CARGO_TARGET_DIR:-$GITHUB_WORKSPACE/target}/${{ matrix.target }}/debug/intendant"

      - name: peer-sessions smoke
        if: runner.os == 'Linux' && steps.relevance_unix.outputs.relevant != 'false'
        run: |
          export INTENDANT_BIN="${CARGO_TARGET_DIR:-$GITHUB_WORKSPACE/target}/${{ matrix.target }}/debug/intendant"
          python3 tests/skills/peer-sessions-smoke/peer-rig.py

      # Idle keyless daemon for the dashboard-boot probe: mock provider
      # (no API keys by construction), kernel-assigned port parsed from
      # the Dashboard line, empty intendant.toml as the minimal project
      # marker, isolated temp HOME.
      - name: Launch keyless daemon (dashboard-boot)
        id: daemon
        if: runner.os == 'Linux' && steps.relevance_unix.outputs.relevant != 'false'
        shell: bash
        run: |
          rig="$RUNNER_TEMP/dashboard-boot"
          rm -rf "$rig"
          mkdir -p "$rig/home" "$rig/proj" "$rig/artifacts"
          printf '{"profiles":[{"steps":[{"content":"ok"}]}]}' > "$rig/home/mock_script.json"
          : > "$rig/proj/intendant.toml"
          cd "$rig/proj"
          env -u OPENAI_API_KEY -u ANTHROPIC_API_KEY -u GEMINI_API_KEY -u MODEL_NAME \
            HOME="$rig/home" PROVIDER=mock INTENDANT_MOCK_SCRIPT="$rig/home/mock_script.json" \
            "${CARGO_TARGET_DIR:-$GITHUB_WORKSPACE/target}/${{ matrix.target }}/debug/intendant" --web 0 --bind 127.0.0.1 --no-tls \
            > "$rig/daemon.log" 2>&1 &
          pid=$!
          echo "pid=$pid" >> "$GITHUB_OUTPUT"
          echo "rig=$rig" >> "$GITHUB_OUTPUT"
          port=""
          for _ in $(seq 1 120); do
            port=$(sed -nE 's#.*Dashboard: https?://127\.0\.0\.1:([0-9]+).*#\1#p' "$rig/daemon.log" | head -1)
            [ -n "$port" ] && break
            if ! kill -0 "$pid" 2>/dev/null; then
              echo "::error::daemon exited during startup"
              tail -n 40 "$rig/daemon.log"
              exit 1
            fi
            sleep 0.5
          done
          if [ -z "$port" ]; then
            echo "::error::daemon did not print its Dashboard URL within 60s"
            tail -n 40 "$rig/daemon.log"
            exit 1
          fi
          echo "port=$port" >> "$GITHUB_OUTPUT"
          echo "daemon pid=$pid port=$port"

      - name: dashboard-boot smoke
        if: runner.os == 'Linux' && steps.relevance_unix.outputs.relevant != 'false'
        run: >
          node scripts/smoke-dashboard-boot.cjs
          --url "http://127.0.0.1:${{ steps.daemon.outputs.port }}/"
          --artifact-dir "${{ steps.daemon.outputs.rig }}/artifacts"

      - name: Stop daemon (dashboard-boot)
        if: always() && steps.daemon.outputs.pid != ''
        shell: bash
        run: kill "${{ steps.daemon.outputs.pid }}" 2>/dev/null || true

      # Inline visibility first (the artifact needs a download), then the
      # full daemon log + the smoke's screenshot/error dumps as artifacts.
      - name: Daemon log tail (failure)
        if: failure() && steps.daemon.outputs.rig != ''
        shell: bash
        run: tail -n 80 "${{ steps.daemon.outputs.rig }}/daemon.log" || true

      - name: Upload failure artifacts (dashboard-boot)
        if: failure() && steps.daemon.outputs.rig != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dashboard-boot-failure-${{ matrix.os }}
          path: |
            ${{ steps.daemon.outputs.rig }}/daemon.log
            ${{ steps.daemon.outputs.rig }}/artifacts/
          if-no-files-found: ignore
          retention-days: 7
          overwrite: true
