name: Deploy docs

on:
  push:
    branches: [main]
    # The published mdBook is only docs/src + book.toml. Without this filter
    # every push to main redeployed a byte-identical Pages artifact (~9 of
    # every 10 pushes touch no book sources). Mirrors audit.yml's scoping.
    paths:
      - "docs/src/**"
      - "docs/book.toml"
      - ".github/workflows/docs.yml"
  # Manual escape hatch: redeploy without faking a docs commit.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # The default persisted token grants every later step push access;
        # nothing in these jobs pushes.
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: mdbook
      - run: mdbook build docs
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/book
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
